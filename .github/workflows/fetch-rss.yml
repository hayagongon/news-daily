name: Fetch RSS News

on:
  schedule:
    - cron: '55 14 * * *'   # UTC 14:55 = JST 23:55
  workflow_dispatch:          # GitHub の画面から手動実行も可能

permissions:
  contents: write             # rss-articles.json をコミット・プッシュするために必要

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch RSS feeds
        run: node scripts/fetch-rss.js

      - name: Commit and push updated articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss-articles.json
          git diff --staged --quiet \
            || git commit -m "📰 $(date -u +'%Y-%m-%d') ニュース更新"
          git push
